    <style>
        :root {
            --bg: #FAF7F2; --bg-secondary: #FFFFFF; --text: #2D2D2C; --text-secondary: #8B8A87;
            --border: #E8E2D6; --bubble-user: #2D2D2C; --bubble-user-text: #FFFFFF;
            --bubble-ai: #FFFFFF; --bubble-ai-text: #2D2D2C; --input-bg: #FFFFFF;
            --drawer-bg: #FAF7F2; --card-bg: #FFFFFF; --hover-bg: #F0ECE4;
            --toggle-off: #D9D3C7; --toggle-on: #4A6B4A; --toast-bg: #2D2D2C;
            --toast-text: #FFFFFF; --banner-bg: #FFFDF5; --banner-text: #8B7A3A;
            --progress-bg: #F0ECE4; --progress-fill: #D0C5B0; --btn-primary: #2D2D2C;
            --btn-primary-text: #FFFFFF; --btn-secondary: #F0ECE4; --btn-secondary-text: #2D2D2C;
        }
        .dark-mode {
            --bg: #1A1A1A; --bg-secondary: #252525; --text: #E0E0E0; --text-secondary: #888888;
            --border: #333333; --bubble-user: #E0E0E0; --bubble-user-text: #1A1A1A;
            --bubble-ai: #252525; --bubble-ai-text: #E0E0E0; --input-bg: #252525;
            --drawer-bg: #1A1A1A; --card-bg: #252525; --hover-bg: #2A2A2A;
            --toggle-off: #444444; --toggle-on: #6AAA6A; --toast-bg: #E0E0E0;
            --toast-text: #1A1A1A; --banner-bg: #2A2A20; --banner-text: #B8A060;
            --progress-bg: #2A2A2A; --progress-fill: #8B8A87; --btn-primary: #E0E0E0;
            --btn-primary-text: #1A1A1A; --btn-secondary: #2A2A2A; --btn-secondary-text: #E0E0E0;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .app-container { width:100%; max-width:500px; height:100vh; background:var(--bg); position:relative; overflow:hidden; box-shadow:0 0 30px rgba(0,0,0,0.03); display:flex; flex-direction:column; }
        .password-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.4s ease, visibility 0.4s; }
        .password-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .password-screen .pw-glow { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; background:radial-gradient(circle, rgba(200,180,140,0.12) 0%, rgba(250,247,242,0) 70%); border-radius:50%; animation:breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%,100%{opacity:0.3; transform:translate(-50%,-50%) scale(0.95);} 50%{opacity:0.7; transform:translate(-50%,-50%) scale(1.05);} }
        .password-screen .pw-content { position:relative; z-index:2; text-align:center; padding:30px; }
        .password-screen .pw-title { font-size:28px; font-weight:400; color:var(--text); margin-bottom:8px; }
        .password-screen .pw-sub { font-size:14px; color:var(--text-secondary); margin-bottom:20px; }
        .password-screen input { width:220px; padding:14px 18px; border:1px solid var(--border); border-radius:14px; font-size:16px; background:var(--input-bg); color:var(--text); outline:none; text-align:center; letter-spacing:4px; font-family:inherit; -webkit-text-security:disc; }
        .password-screen .pw-error { font-size:12px; color:#C06050; margin-top:10px; min-height:18px; }
        .password-screen .pw-btn { margin-top:16px; padding:12px 30px; background:var(--btn-primary); color:var(--btn-primary-text); border:none; border-radius:14px; font-size:15px; cursor:pointer; }
        .password-screen .pw-setup-hint { font-size:11px; color:var(--text-secondary); margin-top:12px; }

        .main-content { flex:1; position:relative; overflow:hidden; }
        .page { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; opacity:0; transform:translateY(8px); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events:none; overflow:hidden; }
        .page.active { opacity:1; transform:translateY(0); pointer-events:auto; }
        .bottom-nav { display:flex; border-top:1px solid var(--border); background:var(--bg); padding-bottom:env(safe-area-inset-bottom, 0); z-index:20; align-items:flex-end; }
        .bottom-nav .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 6px; cursor:pointer; color:var(--text-secondary); font-size:10px; gap:2px; transition:0.2s; position:relative; z-index:1; }
        .bottom-nav .nav-item.active { color:var(--text); }
        .bottom-nav .nav-item .nav-icon { font-size:22px; }
        .bottom-nav .nav-item.chat-btn .nav-icon-circle { width:48px; height:48px; border-radius:50%; background:var(--btn-primary); color:var(--btn-primary-text); display:flex; align-items:center; justify-content:center; font-size:22px; margin-top:-18px; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
        .bottom-nav .nav-item.chat-btn span { margin-top:2px; }

        .home-page { align-items:center; justify-content:center; gap:20px; padding:20px; }
        .home-avatar { width:100px; height:100px; border-radius:50%; background:var(--hover-bg); display:flex; align-items:center; justify-content:center; font-size:50px; color:var(--text-secondary); overflow:hidden; animation: popIn 0.5s cubic-bezier(0.21, 1.02, 0.58, 1) forwards; }
        .home-avatar img { width:100%; height:100%; object-fit:cover; }
        .home-name { font-size:24px; font-weight:500; color:var(--text); animation: fadeInUp 0.5s 0.1s ease forwards; opacity:0; }
        .home-days { font-size:14px; color:var(--text-secondary); animation: fadeInUp 0.5s 0.2s ease forwards; opacity:0; }
        .home-diary-preview { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:16px; width:85%; max-width:350px; animation: fadeInUp 0.5s 0.3s ease forwards; opacity:0; }
        .home-diary-preview .diary-label { font-size:11px; color:var(--text-secondary); margin-bottom:6px; }
        .home-diary-preview .diary-text { font-size:14px; color:var(--text); line-height:1.5; max-height:80px; overflow:hidden; }
        .home-chat-btn { margin-top:8px; padding:14px 40px; background:var(--btn-primary); color:var(--btn-primary-text); border:none; border-radius:25px; font-size:16px; cursor:pointer; animation: fadeInUp 0.5s 0.4s ease forwards; opacity:0; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

        .chat-page { display:flex; flex-direction:column; }
        .top-bar { padding:12px 16px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; z-index:10; flex-shrink:0; }
        .top-bar .avatar-btn { width:36px; height:36px; border-radius:50%; background:var(--hover-bg); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-secondary); overflow:hidden; cursor:pointer; border:none; flex-shrink:0; }
        .top-bar .avatar-btn img { width:100%; height:100%; object-fit:cover; }
        .top-bar .title { font-size:17px; font-weight:500; color:var(--text); margin-left:8px; cursor:pointer; flex:1; }
        .top-bar .calendar-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:6px; color:var(--text-secondary); flex-shrink:0; }
        .music-bar { margin:4px 12px; padding:8px 12px; background:var(--card-bg); border-radius:12px; border:1px solid var(--border); font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:6px; cursor:default; flex-shrink:0; }
        .music-bar.hidden { display:none; }
        .music-bar .music-note { font-size:14px; }
        .music-bar .music-close { margin-left:auto; background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:14px; }
        .chat-log { flex:1; overflow-y:auto; padding:12px 12px 6px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
        .message { display:flex; flex-direction:column; max-width:85%; position:relative; }
        .message.user { align-self:flex-end; align-items:flex-end; }
        .message.assistant { align-self:flex-start; align-items:flex-start; }
        .bubble { padding:11px 14px; border-radius:18px; font-size:15px; line-height:1.5; word-break:break-word; cursor:pointer; transition: transform 0.08s; animation: popIn 0.35s cubic-bezier(0.21, 1.02, 0.58, 1) forwards; }
        .message.user .bubble { background:var(--bubble-user); color:var(--bubble-user-text); border-bottom-right-radius:6px; transform-origin: bottom right; }
        .message.assistant .bubble { background:var(--bubble-ai); color:var(--bubble-ai-text); border-bottom-left-radius:6px; box-shadow:0 1px 6px rgba(0,0,0,0.06); transform-origin: bottom left; }
        @keyframes popIn { 0% { opacity:0; transform: scale(0.85); } 60% { opacity:1; transform: scale(1.04); } 100% { opacity:1; transform: scale(1); } }
        .typing-bubble { background:var(--bubble-ai); color:var(--text-secondary); border-bottom-left-radius:6px; box-shadow:0 1px 6px rgba(0,0,0,0.06); display:inline-flex; align-items:center; gap:2px; padding:12px 16px; border-radius:18px; font-size:14px; letter-spacing:1px; animation: popIn 0.35s cubic-bezier(0.21, 1.02, 0.58, 1) forwards; transform-origin: bottom left; }
        .typing-bubble span { animation: dotPulse 1.4s infinite; }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,60%,100% { opacity:0.2; transform:translateY(0); } 30% { opacity:1; transform:translateY(-3px); } }
        .message img { max-width:100%; border-radius:12px; cursor:pointer; }
        .message .timestamp { font-size:10px; color:var(--text-secondary); margin-top:3px; padding:0 6px; display:flex; align-items:center; gap:6px; }
        .message .edited-tag { font-size:9px; color:#B8A88A; font-style:italic; }
        .message .rewind-row { display:none; align-items:center; gap:6px; margin-top:2px; font-size:11px; }
        .message.selected .rewind-row { display:flex; }
        .rewind-row button { background:var(--hover-bg); border:none; padding:4px 10px; border-radius:10px; cursor:pointer; font-size:12px; color:var(--text); }
        .rewind-row button:disabled { opacity:0.4; cursor:not-allowed; }
        .rewind-row .ver-indicator { color:var(--text-secondary); font-size:10px; }
        .message.highlight .bubble { animation:highlightPulse 1.5s ease; }
        @keyframes highlightPulse { 0%{box-shadow:0 0 0 0 rgba(200,180,140,0.6);} 50%{box-shadow:0 0 0 8px rgba(200,180,140,0);} 100%{box-shadow:0 0 0 0 rgba(200,180,140,0);} }
        .input-area { padding:8px 12px 16px; padding-bottom:max(16px, env(safe-area-inset-bottom, 16px)); background:var(--bg); border-top:1px solid var(--border); display:flex; gap:6px; align-items:flex-end; z-index:10; flex-shrink:0; }
        .attach-btn { width:38px; height:38px; border-radius:50%; background:transparent; border:1px solid var(--border); color:var(--text-secondary); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .image-preview-row { display:flex; align-items:center; gap:6px; padding:4px 12px; background:var(--bg); }
        .image-preview-row.hidden { display:none; }
        .image-preview-thumb { width:48px; height:48px; border-radius:10px; object-fit:cover; border:1px solid var(--border); }
        .image-preview-remove { background:none; border:none; color:var(--text-secondary); font-size:16px; cursor:pointer; }
        .input-area textarea { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:20px; font-size:15px; background:var(--input-bg); color:var(--text); outline:none; resize:none; max-height:100px; font-family:inherit; }
        .send-btn { width:38px; height:38px; border-radius:50%; background:var(--btn-primary); border:none; color:var(--btn-primary-text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; flex-shrink:0; }
        .send-btn.edit-mode { background:#8B8A87; font-size:14px; }
        .edit-cancel-btn { display:none; width:28px; height:28px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:14px; cursor:pointer; }
        .edit-cancel-btn.visible { display:flex; align-items:center; justify-content:center; }
        .chat-log::-webkit-scrollbar { width:4px; }
        .chat-log::-webkit-scrollbar-thumb { background:var(--progress-fill); border-radius:4px; }

        .calendar-page { overflow-y:auto; }
        .calendar-page .cal-header-row { padding:12px 16px; display:flex; align-items:center; justify-content:center; gap:8px; border-bottom:1px solid var(--border); }
        .calendar-page .cal-header-row button { background:none; border:none; font-size:20px; color:var(--text-secondary); cursor:pointer; padding:4px 8px; }
        .calendar-page .cal-header-row .month-label { font-size:15px; font-weight:500; color:var(--text); min-width:40px; text-align:center; }
        .calendar-page .cal-header-row .year-label { font-size:15px; font-weight:500; color:var(--text-secondary); cursor:pointer; text-decoration:underline; text-underline-offset:3px; }
        .calendar-page .cal-tabs { display:flex; gap:0; padding:8px 12px; border-bottom:1px solid var(--border); }
        .calendar-page .cal-tabs .tab { flex:1; text-align:center; padding:8px 0; font-size:13px; color:var(--text-secondary); cursor:pointer; border-radius:8px; transition:0.2s; }
        .calendar-page .cal-tabs .tab.active { background:var(--hover-bg); color:var(--text); font-weight:500; }
        .calendar-page .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; gap:4px; padding:8px 12px; }
        .calendar-page .cal-grid .day-name { font-size:11px; color:var(--text-secondary); padding:4px 0; }
        .calendar-page .cal-grid .day-cell { aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text); border-radius:50%; position:relative; cursor:pointer; transition:0.2s; border:2px solid transparent; }
        .calendar-page .cal-grid .day-cell.today { font-weight:600; background:var(--hover-bg); }
        .calendar-page .cal-grid .day-cell.has-diary::after { content:''; position:absolute; bottom:3px; width:5px; height:5px; background:#B8A88A; border-radius:50%; }
        .calendar-page .cal-grid .day-cell.mark-anniversary::before { content:'★'; position:absolute; top:1px; right:3px; font-size:10px; color:#D4A853; }
        .calendar-page .cal-grid .day-cell.mark-period { background:rgba(220,160,140,0.15); border-radius:40%; }
        .calendar-page .cal-grid .day-cell.mark-custom::before { content:'•'; position:absolute; top:1px; right:3px; font-size:10px; color:var(--text-secondary); }
        .calendar-page .cal-grid .day-cell.selected { background:var(--progress-fill); color:white; }
        .calendar-page .cal-grid .day-cell.other-month { color:var(--toggle-off); }
        .calendar-page .search-container { padding:8px 12px; }
        .calendar-page .search-input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:20px; font-size:14px; background:var(--input-bg); color:var(--text); outline:none; font-family:inherit; }
        .calendar-page .search-results { margin:4px 12px 8px; max-height:calc(100vh - 200px); overflow-y:auto; }
        .calendar-page .search-result-item { padding:10px 12px; background:var(--card-bg); border-radius:10px; margin-bottom:4px; cursor:pointer; border:1px solid var(--border); font-size:13px; color:var(--text); line-height:1.4; }
        .calendar-page .search-result-item .sr-date { font-size:10px; color:var(--text-secondary); }
        .calendar-page .search-result-item .sr-role { font-weight:500; font-size:11px; color:var(--text-secondary); }

        .memory-main { display:flex; flex-direction:column; gap:16px; padding:20px 16px; flex:1; overflow-y:auto; align-items:center; }
        .memory-tag { display:inline-block; background:#FFF9E6; border:1px solid #F0E8C0; border-radius:12px; padding:5px 10px; font-size:11px; color:#8B7A3A; margin:3px; }
        .dark-mode .memory-tag { background:#3A3A20; border-color:#5A5A30; color:#C8C060; }
        .memory-card { width:100%; max-width:320px; padding:32px 24px; border-radius:16px; border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; cursor:pointer; transition:0.2s; }
        .memory-card:active { transform:scale(0.97); }
        .memory-card .card-emoji { font-size:40px; margin-bottom:8px; }
        .memory-card .card-label { font-size:17px; font-weight:500; color:var(--text); }
        .memory-card .card-sub { font-size:12px; color:var(--text-secondary); margin-top:4px; }

        .settings-fullscreen { position:absolute; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:50; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.25,0.1,0.25,1); display:flex; flex-direction:column; }
        .settings-fullscreen.open { transform:translateY(0); }
        .settings-fullscreen .sf-header { padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .settings-fullscreen .sf-back { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); }
        .settings-fullscreen .sf-title { font-size:17px; font-weight:500; color:var(--text); }
        .settings-fullscreen .settings-tabs { display:flex; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .settings-fullscreen .settings-tabs .tab { flex:1; text-align:center; padding:8px 0; font-size:13px; color:var(--text-secondary); cursor:pointer; border-radius:8px; }
        .settings-fullscreen .settings-tabs .tab.active { background:var(--hover-bg); color:var(--text); font-weight:500; }
        .settings-fullscreen .settings-tab-content { display:none; padding:12px 16px; flex:1; overflow-y:auto; }
        .settings-fullscreen .settings-tab-content.active { display:block; }
        .settings-item { padding:12px 0; border-bottom:1px solid rgba(128,128,128,0.08); display:flex; align-items:center; justify-content:space-between; }
        .settings-item .settings-label { font-size:14px; color:var(--text); }
        .settings-item .settings-value { font-size:14px; color:var(--text-secondary); cursor:pointer; }
        .settings-item select { padding:8px 10px; border:1px solid var(--border); border-radius:10px; font-size:14px; background:var(--input-bg); color:var(--text); outline:none; font-family:inherit; max-width:150px; }
        .settings-item input { padding:8px 10px; border:1px solid var(--border); border-radius:10px; font-size:14px; background:var(--input-bg); color:var(--text); outline:none; font-family:inherit; max-width:120px; }

        .bottom-drawer { position:absolute; bottom:0; left:0; width:100%; height:70%; background:var(--bg); z-index:55; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.25,0.1,0.25,1); display:flex; flex-direction:column; border-radius:20px 20px 0 0; box-shadow:0 -4px 20px rgba(0,0,0,0.1); }
        .bottom-drawer.open { transform:translateY(0); }
        .bottom-drawer .drawer-handle { width:40px; height:5px; background:var(--toggle-off); border-radius:3px; margin:10px auto 6px; flex-shrink:0; cursor:grab; }
        .bottom-drawer .drawer-header { padding:4px 16px 12px; text-align:center; font-size:16px; font-weight:500; color:var(--text); border-bottom:1px solid var(--border); flex-shrink:0; }
        .bottom-drawer .drawer-content { flex:1; overflow-y:auto; padding:12px 16px; }
        .bottom-drawer .drawer-bottom-btn { margin:12px 16px 20px; padding:12px; background:var(--btn-secondary); color:var(--btn-secondary-text); border:none; border-radius:14px; font-size:14px; cursor:pointer; text-align:center; width:calc(100% - 32px); flex-shrink:0; }
        .usage-section { padding:0 0 16px; border-bottom:1px solid var(--border); }
        .usage-section-title { font-size:11px; color:var(--text-secondary); font-weight:500; margin-bottom:12px; }
        .progress-bar-wrap { background:var(--progress-bg); border-radius:8px; height:12px; margin-bottom:6px; overflow:hidden; }
        .progress-bar-fill { background:var(--progress-fill); height:100%; border-radius:8px; transition:width 0.5s; }
        .progress-label { font-size:11px; color:var(--text-secondary); }
        .stat-card { background:var(--card-bg); border-radius:14px; border:1px solid var(--border); padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
        .stat-card .stat-title { font-size:13px; color:var(--text-secondary); }
        .stat-card .stat-tokens { font-size:15px; font-weight:500; color:var(--text); }
        .stat-card .stat-cost { font-size:11px; color:#B8A88A; margin-top:2px; }

        .modal-card button { padding:10px 16px; border-radius:12px; border:none; font-size:14px; font-weight:500; cursor:pointer; }
        .save-btn { background:var(--btn-primary); color:var(--btn-primary-text); }
        .cancel-btn { background:var(--btn-secondary); color:var(--btn-secondary-text); }
        .context-menu { position:fixed; background:var(--card-bg); border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.1); z-index:250; min-width:160px; padding:6px 0; display:none; }
        .context-menu.show { display:block; }
        .context-menu .menu-title { padding:8px 16px; font-size:11px; color:var(--text-secondary); border-bottom:1px solid var(--border); }
        .context-menu .menu-item { padding:10px 16px; font-size:14px; color:var(--text); cursor:pointer; transition:0.1s; }
        .context-menu .menu-item:hover { background:var(--hover-bg); }
        .context-menu .menu-item.danger { color:#C06050; }
        .image-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:300; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .image-overlay img { max-width:95%; max-height:95%; border-radius:8px; }
        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--toast-bg); color:var(--toast-text); padding:10px 20px; border-radius:20px; font-size:13px; z-index:300; opacity:0; transition:opacity 0.3s; pointer-events:none; }
        .toast.show { opacity:1; }
        .reminder-banner { margin:4px 12px; padding:8px 12px; background:var(--banner-bg); border-radius:12px; border:1px solid #F0E8C0; font-size:12px; color:var(--banner-text); display:flex; align-items:center; gap:6px; cursor:default; flex-shrink:0; }
        .reminder-banner.hidden { display:none; }
        .reminder-banner .banner-close { margin-left:auto; background:none; border:none; color:var(--banner-text); cursor:pointer; font-size:14px; }
        .toggle-switch { position:relative; width:44px; height:26px; background:var(--toggle-off); border-radius:13px; cursor:pointer; transition:0.2s; flex-shrink:0; }
        .toggle-switch.on { background:var(--toggle-on); }
        .toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; background:white; border-radius:50%; transition:0.2s; }
        .toggle-switch.on::after { left:21px; }
        .year-list { max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }

        .year-list .year-item.active { background:var(--progress-fill); color:white; font-weight:600; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">

    <div class="password-screen" id="passwordScreen">

            <div class="drawer-handle"></div>
            <div class="drawer-header">记忆库</div>
            <div class="drawer-content" id="memoryDrawerContent"></div>
            <button class="drawer-bottom-btn" id="memoryDrawerAddBtn">+ 手动添加一条</button>
        </div>

    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" data-page="pageHome"><span class="nav-icon">🏠</span>主页</div>
        <div class="nav-item" data-page="pageMemory"><span class="nav-icon">📖</span>回忆</div>
        <div class="nav-item chat-btn" data-page="pageChat"><div class="nav-icon-circle">💬</div>聊天</div>
        <div class="nav-item" data-page="pageCalendar"><span class="nav-icon">📅</span>日历</div>
        <div class="nav-item" data-page="pageSettings"><span class="nav-icon">⚙️</span>设置</div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay hidden" id="editNameModal"><div class="modal-card"><h3>编辑名字</h3><input type="text" id="editNameInput" maxlength="20"><div class="btn-row"><button class="cancel-btn" id="cancelNameBtn">取消</button><button class="save-btn" id="saveNameBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="editPromptModal"><div class="modal-card"><h3>互动指令</h3><textarea id="editPromptInput"></textarea><div class="btn-row"><button class="cancel-btn" id="cancelPromptBtn">取消</button><button class="save-btn" id="savePromptBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="editApiKeyModal"><div class="modal-card"><h3>API Keys</h3><textarea id="editApiKeyInput" placeholder="多个Key用英文逗号分隔" style="height:80px;"></textarea><div class="btn-row"><button class="cancel-btn" id="cancelApiKeyBtn">取消</button><button class="save-btn" id="saveApiKeyBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="editPricingModal"><div class="modal-card"><h3>费率设置</h3><select id="pricingPreset"><option value="custom">自定义</option><option value="deepseek-v3">DeepSeek V3 (¥1/¥2)</option><option value="deepseek-r1">DeepSeek R1 (¥4/¥16)</option></select><input type="number" id="editInputPrice" placeholder="输入价格（每百万token）" step="0.01" min="0"><input type="number" id="editOutputPrice" placeholder="输出价格（每百万token）" step="0.01" min="0"><div class="btn-row"><button class="cancel-btn" id="cancelPricingBtn">取消</button><button class="save-btn" id="savePricingBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="changePasswordModal"><div class="modal-card"><h3>修改密码</h3><input type="password" id="oldPasswordInput" placeholder="旧密码"><input type="password" id="newPasswordInput" placeholder="新密码"><div class="btn-row"><button class="cancel-btn" id="cancelChangePwBtn">取消</button><button class="save-btn" id="saveChangePwBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="clearChatModal"><div class="modal-card"><h3>清空对话</h3><div style="font-size:13px;color:var(--text-secondary);text-align:center;">此操作不可撤销。请输入"确认删除"后点击确认。</div><input type="text" id="clearChatConfirmInput" placeholder="输入 确认删除"><div class="btn-row"><button class="cancel-btn" id="cancelClearChatBtn">取消</button><button class="save-btn" id="confirmClearChatBtn" disabled style="opacity:0.5;">确认清空</button></div></div></div>
    <div class="modal-overlay hidden" id="musicModal"><div class="modal-card"><h3>一起听歌</h3><div style="font-size:12px;color:var(--text-secondary);text-align:center;">从音乐App复制链接后回来点"读取剪贴板"</div><input type="text" id="musicSongInput" placeholder="歌名"><input type="text" id="musicArtistInput" placeholder="歌手（可选）"><div class="btn-row"><button class="cancel-btn" id="readClipboardBtn">📋 读取剪贴板</button><button class="cancel-btn" id="cancelMusicBtn">取消</button><button class="save-btn" id="saveMusicBtn">开始听</button></div></div></div>
    <div class="modal-overlay hidden" id="yearPickerModal"><div class="modal-card"><h3>选择年份</h3><div class="year-list" id="yearList"></div><div class="btn-row"><button class="cancel-btn" id="cancelYearBtn">取消</button></div></div></div>
    <div class="modal-overlay hidden" id="addMarkModal"><div class="modal-card"><h3 id="addMarkTitle">添加日程</h3><input type="text" id="markTitleInput" placeholder="标题（必填）" maxlength="50"><select id="markTypeSelect"><option value="anniversary">纪念日</option><option value="period-start">经期开始</option><option value="period-end">经期结束</option><option value="custom">自定义日程</option></select><textarea id="markNoteInput" placeholder="备注（可选）" style="height:60px;"></textarea><select id="markReminderSelect"><option value="none">不提醒</option><option value="day-before">提前一天</option><option value="same-day">当天早上</option><option value="one-hour">提前一小时</option></select><input type="hidden" id="editMarkDate"><input type="hidden" id="editMarkIsNew" value="true"><div class="btn-row"><button class="cancel-btn" id="cancelMarkBtn">取消</button><button class="save-btn" id="saveMarkBtn">保存</button><button class="cancel-btn" id="deleteMarkBtn" style="display:none;color:#C06050;">删除</button></div></div></div>
    <div class="modal-overlay hidden" id="addMemoryModal"><div class="modal-card"><h3>添加记忆</h3><select id="memCategorySelect"><option value="about_you">关于你</option><option value="about_us">我们之间</option></select><textarea id="memContentInput" placeholder="写一条记忆..."></textarea><div class="btn-row"><button class="cancel-btn" id="cancelMemBtn">取消</button><button class="save-btn" id="saveMemBtn">保存</button></div></div></div>
    <div class="modal-overlay hidden" id="paramSelectModal"><div class="modal-card"><h3 id="paramSelectTitle">选择</h3><div id="paramSelectOptions" style="max-height:50vh;overflow-y:auto;"></div><div class="btn-row"><button class="cancel-btn" id="cancelParamSelectBtn">取消</button></div></div></div>
    <div class="toast" id="toast"></div>
    <div class="context-menu" id="contextMenu"></div>
</div>

<script>
(function() {
    const $ = (id) => document.getElementById(id);
    const passwordScreen = $('passwordScreen'), passwordInput = $('passwordInput'), pwError = $('pwError'), pwSubmitBtn = $('pwSubmitBtn'), pwSub = $('pwSub'), pwSetupHint = $('pwSetupHint');
    const chatLog = $('chatLog'), userInput = $('userInput'), sendBtn = $('sendBtn'), editCancelBtn = $('editCancelBtn');
    const attachBtn = $('attachBtn'), imageInput = $('imageInput'), imagePreviewRow = $('imagePreviewRow'), imagePreviewThumb = $('imagePreviewThumb'), imagePreviewRemove = $('imagePreviewRemove');
    const topAvatarBtn = $('topAvatarBtn'), topBarName = $('topBarName');
    const musicBar = $('musicBar'), musicBarText = $('musicBarText'), musicCloseBtn = $('musicCloseBtn');
    const reminderBanner = $('reminderBanner'), reminderBannerText = $('reminderBannerText'), bannerCloseBtn = $('bannerCloseBtn');
    const contextMenu = $('contextMenu');
    const settingsFullscreen = $('settingsFullscreen'), settingsFsTabs = $('settingsFsTabs');
    const usageDrawer = $('usageDrawer'), memoryDrawer = $('memoryDrawer');
    const toast = $('toast');
    const PW_HASH_KEY = 'claude_pw_hash_v2';

    let PARTNER_NAME = localStorage.getItem('claude_partner_name') || '七次元';
    let PARTNER_AVATAR = localStorage.getItem('claude_partner_avatar') || '';
    let API_KEYS = (localStorage.getItem('claude_api_keys') || '').split(',').filter(k => k.trim());
    let API_MODELS = (localStorage.getItem('claude_models') || 'deepseek-chat').split(',').filter(m => m.trim());
    let currentKeyIndex = parseInt(localStorage.getItem('claude_key_index') || '0');
    let SYSTEM_PROMPT = localStorage.getItem('claude_system_prompt') || '';
    let IMAGE_ENABLED = localStorage.getItem('claude_image_enabled') !== 'false';
    let INPUT_PRICE = parseFloat(localStorage.getItem('claude_input_price') || '1'), OUTPUT_PRICE = parseFloat(localStorage.getItem('claude_output_price') || '2');
    let TEMPERATURE = parseFloat(localStorage.getItem('claude_temperature') || '0.9'), TOP_P = parseFloat(localStorage.getItem('claude_top_p') || '1.0');
    let MAX_TOKENS = parseInt(localStorage.getItem('claude_max_tokens') || '1024');
    let MAX_SENTENCES = parseInt(localStorage.getItem('claude_max_sentences') || '3');
    let FREQ_PENALTY = parseFloat(localStorage.getItem('claude_freq_penalty') || '0.1'), PRES_PENALTY = parseFloat(localStorage.getItem('claude_pres_penalty') || '0.1');
    let THEME_MODE = localStorage.getItem('claude_theme') || 'auto';
    let conversationHistory = [], diary = {}, calendarMarks = {}, memoryBank = { about_you: [], about_us: [] }, usageLog = [];
    let pendingImage = null, selectedMessageId = null, editingMsgTimestamp = null;
    let calendarFilter = 'calendar', currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear(), selectedDate = null, activeMarkDate = null;
    let currentMusic = null, notificationPermission = false;
    let currentAbortController = null, userInputTimer = null;
    let currentPage = 'pageHome', previousPage = 'pageHome';
    const TYPING_DELAY = 1500;

    const MEMORY_WINDOW = 40, RECENT_KEEP = 20;
    const PRICING_PRESETS = { 'deepseek-v3':{input:1,output:2}, 'deepseek-r1':{input:4,output:16} };
    const TEMP_PRESETS = [{label:'保守',value:0.3},{label:'平衡',value:0.9},{label:'创意',value:1.3},{label:'疯狂',value:1.8}];
    const TOPP_PRESETS = [{label:'0.1',value:0.1},{label:'0.3',value:0.3},{label:'0.5',value:0.5},{label:'0.7',value:0.7},{label:'0.9',value:0.9},{label:'1.0',value:1}];
    const SENTENCE_PRESETS = [{label:'1句',value:1},{label:'2句',value:2},{label:'3句',value:3},{label:'4句',value:4},{label:'5句',value:5},{label:'6句',value:6},{label:'7句',value:7},{label:'8句',value:8}];
    const TOKENS_PRESETS = [{label:'短',value:512},{label:'中',value:1024},{label:'长',value:2048},{label:'超长',value:4096}];
    const PENALTY_PRESETS = [{label:'无',value:0},{label:'低',value:0.1},{label:'中',value:0.5},{label:'高',value:1}];

    // ========== 页面导航 ==========
    function switchPage(pageId){
        if(currentPage === pageId) return;
        if(currentPage !== 'pageSettings') previousPage = currentPage;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = $(pageId);
        if(target){ target.classList.add('active'); currentPage = pageId; }
        document.querySelectorAll('.bottom-nav .nav-item').forEach(n => {
            n.classList.toggle('active', n.dataset.page === pageId);
        });
        if(pageId === 'pageChat'){ scrollToBottom(); userInput.focus(); }
        if(pageId === 'pageCalendar'){ renderCalendarPanel(); }
        if(pageId === 'pageHome'){ refreshHomePage(); }
        if(pageId === 'pageMemory'){ refreshMemoryMain(); }
        settingsFullscreen.classList.remove('open');
        usageDrawer.classList.remove('open');
        memoryDrawer.classList.remove('open');
    }
    $('bottomNav').addEventListener('click', (e)=>{
        const navItem = e.target.closest('.nav-item');
        if(!navItem) return;
        if(navItem.dataset.page === 'pageSettings'){
            previousPage = currentPage;
            openSettings();
            return;
        }
        switchPage(navItem.dataset.page);
    });
    $('homeChatBtn').addEventListener('click', ()=> switchPage('pageChat'));
    $('topCalendarBtn').addEventListener('click', ()=> switchPage('pageCalendar'));

    // ========== 抽屉下拉关闭 ==========
    function makeDrawerClosable(drawerId){
        const drawer = $(drawerId);
        let startY = 0;
        const handle = drawer.querySelector('.drawer-handle');
        handle.addEventListener('touchstart', (e)=>{
            if(!drawer.classList.contains('open')) return;
            startY = e.touches[0].clientY;
            drawer.style.transition = 'none';
            const onMove = (ev)=>{
                const dy = ev.touches[0].clientY - startY;
                if(dy > 0) drawer.style.transform = `translateY(${dy}px)`;
            };
            const onEnd = (ev)=>{
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                drawer.style.transition = 'transform 0.35s cubic-bezier(0.25,0.1,0.25,1)';
                if(ev.changedTouches[0].clientY - startY > 80) drawer.classList.remove('open');
                drawer.style.transform = '';
            };
            document.addEventListener('touchmove', onMove, {passive: false});
            document.addEventListener('touchend', onEnd);
        });
    }
    makeDrawerClosable('usageDrawer');
    makeDrawerClosable('memoryDrawer');

    // ========== 设置全屏 ==========
    function openSettings(){
        settingsFullscreen.classList.add('open');
        refreshSettingsUI();
    }
    function closeSettings(){
        settingsFullscreen.classList.remove('open');
        switchPage(previousPage || 'pageHome');
    }
    $('settingsFsBack').addEventListener('click', closeSettings);
    settingsFsTabs.addEventListener('click', (e)=>{
        if(e.target.classList.contains('tab')){

    // ========== 密码系统 ==========
    async function sha256(m){ const b = new TextEncoder().encode(m); const h = await crypto.subtle.digest('SHA-256', b); return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2,'0')).join(''); }
    function getStoredHash(){ return localStorage.getItem(PW_HASH_KEY); }
    function isPasswordSet(){ return !!getStoredHash(); }
    async function checkPassword(e){ const s = getStoredHash(); if(!s) return false; return await sha256(e) === s; }
    async function setPassword(p){ localStorage.setItem(PW_HASH_KEY, await sha256(p)); }
    function updatePasswordUI(){ if(isPasswordSet()){ pwSub.textContent='请输入密码'; pwSetupHint.style.display='none'; passwordInput.placeholder='密码'; } else { pwSub.textContent='设置密码'; pwSetupHint.style.display='block'; passwordInput.placeholder='设置密码'; } }
    async function handlePasswordSubmit(){ const v = passwordInput.value.trim(); if(!v){ pwError.textContent='请输入密码'; return; } if(!isPasswordSet()){ await setPassword(v); passwordScreen.classList.add('hidden'); passwordInput.value=''; updatePasswordUI(); setTimeout(()=>{ if(currentPage==='pageChat')userInput.focus(); },100); showToast('密码已设置'); return; } if(await checkPassword(v)){ passwordScreen.classList.add('hidden'); passwordInput.value=''; setTimeout(()=>{ if(currentPage==='pageChat')userInput.focus(); },100); } else { pwError.textContent='密码错误'; passwordInput.value=''; passwordInput.focus(); } }
    async function handleChangePassword(){ const o=$('oldPasswordInput').value, n=$('newPasswordInput').value; if(!o||!n){showToast('请填写旧密码和新密码');return;} if(!await checkPassword(o)){showToast('旧密码错误');return;} await setPassword(n); $('changePasswordModal').classList.add('hidden'); $('oldPasswordInput').value=''; $('newPasswordInput').value=''; showToast('密码已修改'); }
    pwSubmitBtn.addEventListener('click',handlePasswordSubmit); passwordInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();handlePasswordSubmit();}});
    $('cancelChangePwBtn').addEventListener('click',()=>$('changePasswordModal').classList.add('hidden'));
    $('saveChangePwBtn').addEventListener('click',handleChangePassword);

    function loadData(){
        const sc=localStorage.getItem('claude_chat_history_v2'); if(sc){try{conversationHistory=JSON.parse(sc).map(m=>{if(!m.versions)m.versions=[m.content||''];if(m.currentVersion===undefined)m.currentVersion=0;return m;});rebuildChatFromHistory();}catch(e){conversationHistory=[];}}
        if(!conversationHistory.length){const n=Date.now();conversationHistory=[{role:'assistant',versions:['嗨，我在。'],currentVersion:0,timestamp:n}];saveHistory();renderMessage('assistant',conversationHistory[0]);}

    function applyForgettingCurve(){ const n=Date.now(),D=86400000; const f=(a)=>a.filter(i=>{if(i.manual)return true;const t=i.ts||0;const age=(n-t)/D;if(age<=7)return true;if(age<=14)return Math.random()<0.5;if(age<=30)return Math.random()<0.25;return false;}); memoryBank.about_you=f(memoryBank.about_you); memoryBank.about_us=f(memoryBank.about_us); saveMemory(); }

    function renderMessage(role, msg){
        const content=getCurrentContent(msg);
        const div=document.createElement('div'); div.className=`message ${role}`; div.dataset.ts=msg.timestamp; div.dataset.role=role;
        const timeStr=new Date(msg.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
        let inner='';
        if(msg.image) inner+=`<img src="${msg.image}" alt="图片" onclick="event.stopPropagation();window.showImageOverlay('${msg.image}')">`;
        if(content) inner+=role==='assistant'?`<div class="bubble">${parseMarkdown(content)}</div>`:`<div class="bubble">${escapeHtml(content)}</div>`;
        inner+=`<div class="timestamp"><span>${timeStr}</span>`;
        if(msg.edited) inner+=`<span class="edited-tag">已编辑</span>`;
        inner+=`</div>`;
        if(role==='assistant'){
            inner+=`<div class="rewind-row"><button class="prev-ver-btn" ${msg.versions.length<=1?'disabled':''}>◂</button><span class="ver-indicator">${msg.currentVersion+1}/${msg.versions.length}</span><button class="next-ver-btn" ${msg.versions.length<=1?'disabled':''}>▸</button><button class="regen-btn">↺ 重新生成</button></div>`;
        }
        div.innerHTML=inner; chatLog.appendChild(div); scrollToBottom();
        const bubble=div.querySelector('.bubble');
        if(bubble){ bubble.addEventListener('click',(e)=>{e.stopPropagation();handleBubbleClick(role,msg.timestamp,div);}); }
        let pressTimer; let isLongPress=false;
        div.addEventListener('touchstart',(e)=>{isLongPress=false;pressTimer=setTimeout(()=>{isLongPress=true;showMessageContextMenu(msg,e);},450);});
        div.addEventListener('touchend',()=>{clearTimeout(pressTimer);});
        div.addEventListener('touchmove',()=>{clearTimeout(pressTimer);isLongPress=false;});
        if(role==='assistant'){
            div.querySelector('.prev-ver-btn')?.addEventListener('click',(e)=>{e.stopPropagation();changeVersion(msg,-1,div);});
            div.querySelector('.next-ver-btn')?.addEventListener('click',(e)=>{e.stopPropagation();changeVersion(msg,1,div);});
            div.querySelector('.regen-btn')?.addEventListener('click',(e)=>{e.stopPropagation();regenerateResponse(msg);});
        }

    async function triggerAIResponse(){

        if(currentAbortController){currentAbortController.abort();currentAbortController=null;}
        const oldTyping=document.querySelector('[data-typing="true"]'); if(oldTyping) oldTyping.remove();
        const typingDiv=createTypingBubble();
        currentAbortController=new AbortController(); const signal=currentAbortController.signal;

            const timeCtx=getTimeContext();
            const msgs=[{role:'system',content:buildSystemPrompt()},...conversationHistory.map(m=>({role:m.role,content:getCurrentContent(m)}))];
            msgs.splice(1,0,{role:'user',content:timeCtx});
            const endpoint=getAPIEndpoint();
            const resp=await makeAPIRequest(endpoint,msgs,signal);
            if(!resp.ok){if(resp.status===429||resp.status===402){if(switchToNextKey()){triggerAIResponse();return;}}throw new Error(`API 错误 ${resp.status}`);}
            const reader=resp.body.getReader(); const dec=new TextDecoder('utf-8'); let buf=''; let lastChunk='';

                const{done,value}=await reader.read(); if(done) break;
                buf+=dec.decode(value,{stream:true}); const lines=buf.split('\n'); buf=lines.pop()||'';

                        try{ const p=JSON.parse(d); const txt=extractStreamText(endpoint.type,p); if(txt){ fullResponse+=txt; } if(p.usage) lastChunk=d; }catch(e){}

        finally{currentAbortController=null;userInput.focus();}
    }

    async function sendImageMessage(img){if(!getCurrentKey()||!SYSTEM_PROMPT)return;if(currentAbortController){currentAbortController.abort();currentAbortController=null;}const old=document.querySelector('[data-typing="true"]');if(old)old.remove();const td=createTypingBubble();currentAbortController=new AbortController();const sig=currentAbortController.signal;let fr='';try{const ms=[{role:'system',content:buildSystemPrompt()},...conversationHistory.map(m=>{if(m.image&&m.role==='user')return{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:m.image.split(',')[1]}},{type:'text',text:getCurrentContent(m)}]};return{role:m.role,content:getCurrentContent(m)};})];const ep=getAPIEndpoint();const rp=await makeAPIRequest(ep,ms,sig);if(!rp.ok){if(rp.status===429||rp.status===402){if(switchToNextKey()){sendImageMessage(img);return;}}throw new Error(`API 错误 ${rp.status}`);}const rd=rp.body.getReader();const dc=new TextDecoder('utf-8');let bf='';let lc='';while(true){const{done,value}=await rd.read();if(done)break;bf+=dc.decode(value,{stream:true});const ls=bf.split('\n');bf=ls.pop()||'';for(const l of ls){if(l.startsWith('data: ')){const d=l.slice(6);if(d==='[DONE]')continue;try{const p=JSON.parse(d);const t=extractStreamText(ep.type,p);if(t){fr+=t;}if(p.usage)lc=d;}catch(e){}}}}if(lc){try{const u=JSON.parse(lc).usage;if(u)recordUsage(u);}catch(e){}}const nm={role:'assistant',versions:[fr],currentVersion:0,timestamp:Date.now()};conversationHistory.push(nm);saveHistory();replaceTypingBubble(td,fr,nm);checkDiaryTriggers();}catch(e){if(e.name==='AbortError'){}else{if(td.parentNode)td.remove();const ed=document.createElement('div');ed.className='message assistant';ed.innerHTML='<div class="bubble">（连接断开了……）</div>';chatLog.appendChild(ed);}}finally{currentAbortController=null;userInput.focus();}}

    // ========== 音乐 ==========
    $('musicEntrySettings').onclick = ()=>{ $('musicModal').classList.remove('hidden'); };
    $('cancelMusicBtn').addEventListener('click',()=>$('musicModal').classList.add('hidden'));
    $('readClipboardBtn').addEventListener('click',async()=>{try{const t=await navigator.clipboard.readText();if(t){const m=t.match(/(.+?)\s*[-–—]\s*(.+?)(?:\s*[\[\(]|$)/);if(m){$('musicSongInput').value=m[1]?.trim()||t.slice(0,30);$('musicArtistInput').value=m[2]?.trim()||'';}else{$('musicSongInput').value=t.slice(0,50);}showToast('已从剪贴板读取');}else{showToast('剪贴板为空');}}catch(e){showToast('无法读取剪贴板');}});
    $('saveMusicBtn').addEventListener('click',()=>{const s=$('musicSongInput').value.trim(),a=$('musicArtistInput').value.trim();if(!s){showToast('请输入歌名');return;}const t=a?`${s} - ${a}`:s;currentMusic=t;musicBarText.textContent=`正在听：${t}`;musicBar.classList.remove('hidden');$('musicModal').classList.add('hidden');addSystemMessage(`我开始听《${t}》了`);const m={role:'user',versions:[`[正在听《${t}》]`],currentVersion:0,timestamp:Date.now()};conversationHistory.push(m);saveHistory();resetTypingTimer();});
    musicCloseBtn.addEventListener('click',()=>{currentMusic=null;musicBar.classList.add('hidden');addSystemMessage('音乐已停止');});
    bannerCloseBtn.addEventListener('click',()=>reminderBanner.classList.add('hidden'));

    // ========== 日记生成 ==========
    async function summarizeMessages(ms){if(!getCurrentKey())return null;const t=ms.map(m=>`${m.role}: ${getCurrentContent(m)}`).join('\n');const p=`请用一段简短的话总结以下对话的关键内容，保留重要的记忆、决定、情绪和事件：\n${t}`;try{const ep=getAPIEndpoint();const rp=await makeAPIRequest(ep,[{role:'user',content:p}]);if(!rp.ok)return null;const d=await rp.json();if(ep.type==='anthropic')return d.content?.[0]?.text?.trim()||null;return d.choices?.[0]?.message?.content?.trim()||null;}catch(e){return null;}}
    function getLastUserMessageTime(){for(let i=conversationHistory.length-1;i>=0;i--)if(conversationHistory[i].role==='user')return conversationHistory[i].timestamp;return 0;}
    function hasGoodnight(){const n=Date.now();const r=/晚安|睡吧|好梦|睡了|去睡|休息了|安/i;for(let i=conversationHistory.length-1;i>=0;i--){const m=conversationHistory[i];if(m.timestamp<n-1800000)break;if(r.test(getCurrentContent(m)))return true;}return false;}

    async function generateDiaryForDate(ds){
        if(!getCurrentKey()) return;
        const start=new Date(ds+'T00:00:00').getTime(), end=new Date(ds+'T23:59:59').getTime();
        const msgs=conversationHistory.filter(m=>m.timestamp>=start&&m.timestamp<=end);
        if(!msgs.length) return;
        const mark=calendarMarks[ds];let extra='';
        if(mark) extra = mark.type==='period-start'?`（经期第1天）`: mark.type==='period'?`（经期中）`:`（${mark.title||'特殊日子'}）`;
        const diaryPrompt = `你是${PARTNER_NAME}，请以第一人称写一篇日记（300-500字），记录今天和我的对话、你的感受、以及你对这段关系的想法。像真人写日记一样，自然、真诚、不做作。${extra}\n\n今天的对话内容：\n${msgs.map(m=>`${m.role==='user'?'他':'我'}:${getCurrentContent(m)}`).join('\n')}`;
        try{
            const endpoint=getAPIEndpoint(); const resp=await makeAPIRequest(endpoint,[{role:'user',content:diaryPrompt}]);
            if(!resp.ok) return; const data=await resp.json();
            const content = endpoint.type==='anthropic'? data.content?.[0]?.text?.trim(): data.choices?.[0]?.message?.content?.trim();
            if(content){ diary[ds]={content,generatedAt:Date.now()}; saveDiary();
                const extractPrompt = `从以下日记中提取1-2条关于"他"的关键信息（喜好、习惯、近期事件等），用简短的一句话表达，不超过30字。如果没有值得长期记忆的信息，回复"无"。\n\n日记：\n${content}`;
                const extractResp = await makeAPIRequest(endpoint,[{role:'user',content:extractPrompt}]);
                if(extractResp.ok){ const extractData = await extractResp.json(); const ec = endpoint.type==='anthropic'? extractData.content?.[0]?.text?.trim(): extractData.choices?.[0]?.message?.content?.trim(); if(ec && ec!=='无'){ memoryBank.about_you.push({text:ec, ts:Date.now()}); saveMemory(); } }
            }
        }catch(e){}
    }
    async function checkDiaryTriggers(){const n=Date.now(),h=new Date().getHours(),td=getTodayDateStr();if(diary[td])return;const l=getLastUserMessageTime();if(l&&(n-l)>1800000&&hasGoodnight()){await generateDiaryForDate(td);return;}if((h>=22||h<6)&&l&&(n-l)>7200000){await generateDiaryForDate(td);}}
    setInterval(()=>{if(!document.hidden){checkDiaryTriggers();checkReminders();}},60000);
    window.addEventListener('focus',()=>{checkDiaryTriggers();checkReminders();});
    function addSystemMessage(t){const d=document.createElement('div');d.className='message assistant';d.innerHTML=`<div class="bubble" style="background:var(--hover-bg);color:var(--text-secondary);border-color:var(--border);">🔔 ${t}</div>`;chatLog.appendChild(d);scrollToBottom();}

    // ========== 回忆页 ==========
    function refreshMemoryMain(){
        const allTags = [...(memoryBank.about_you||[]), ...(memoryBank.about_us||[])].filter(m => m.text).slice(0, 8);
        $('memoryTagsRow').innerHTML = allTags.map(t => `<span class="memory-tag">${escapeHtml(t.text)}</span>`).join('') || '<span style="font-size:11px;color:var(--text-secondary);">还没有记忆碎片，多聊聊天吧 ✨</span>';
        $('diaryCountSub').textContent = Object.keys(diary).filter(d => !diary[d].isLetter).length + ' 篇';
        $('letterCountSub').textContent = Object.keys(diary).filter(d => diary[d].isLetter).length + ' 封';
    }

    // ========== 记忆库 ==========
    function openMemoryDrawer(){
        memoryDrawer.classList.add('open');
        renderMemoryDrawerContent();
    }
    function renderMemoryDrawerContent(){
        const cy = memoryBank.about_you, cu = memoryBank.about_us;
        $('memoryDrawerContent').innerHTML =
            `<div class="md-section-title">关于你 · ${cy.length}条</div>` +
            (cy.length ? cy.map((item,i) => `<div class="mem-item-card">${escapeHtml(item.text||item)} <button class="mem-delete-btn" data-cat="about_you" data-idx="${i}">✕</button></div>`).join('') : '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0;">暂无</div>') +
            `<div class="md-section-title" style="margin-top:16px;">我们之间 · ${cu.length}条</div>` +
            (cu.length ? cu.map((item,i) => `<div class="mem-item-card">${escapeHtml(item.text||item)} <button class="mem-delete-btn" data-cat="about_us" data-idx="${i}">✕</button></div>`).join('') : '<div style="color:var(--text-secondary);font-size:12px;padding:8px 0;">暂无</div>');
        document.querySelectorAll('.mem-delete-btn').forEach(b=>{ b.addEventListener('click',function(e){ e.stopPropagation(); const c=this.dataset.cat,i=parseInt(this.dataset.idx); memoryBank[c].splice(i,1); saveMemory(); renderMemoryDrawerContent(); refreshMemoryMain(); }); });
    }
    $('memoryDrawerAddBtn').addEventListener('click', ()=>{ $('addMemoryModal').classList.remove('hidden'); });

    // ========== 弹窗事件集中绑定 ==========
    $('cancelMemBtn').addEventListener('click', ()=>{ $('addMemoryModal').classList.add('hidden'); });
    $('saveMemBtn').addEventListener('click', ()=>{
        const c=$('memCategorySelect').value, v=$('memContentInput').value.trim();
        if(!v) return;
        memoryBank[c].push({text:v, ts:Date.now(), manual:true});
        saveMemory();
        renderMemoryDrawerContent();
        refreshMemoryMain();
        $('addMemoryModal').classList.add('hidden');
        $('memContentInput').value='';
    });
    $('cancelNameBtn').addEventListener('click',()=>$('editNameModal').classList.add('hidden'));
    $('saveNameBtn').addEventListener('click',()=>{PARTNER_NAME=$('editNameInput').value.trim()||'七次元';localStorage.setItem('claude_partner_name',PARTNER_NAME);applyUI();$('editNameModal').classList.add('hidden');showToast('名字已更新');});
    $('cancelPromptBtn').addEventListener('click',()=>$('editPromptModal').classList.add('hidden'));
    $('savePromptBtn').addEventListener('click',()=>{SYSTEM_PROMPT=$('editPromptInput').value.trim();if(!SYSTEM_PROMPT){showToast('指令不能为空');return;}localStorage.setItem('claude_system_prompt',SYSTEM_PROMPT);$('editPromptModal').classList.add('hidden');showToast('互动指令已更新');});
    $('cancelApiKeyBtn').addEventListener('click',()=>$('editApiKeyModal').classList.add('hidden'));
    $('saveApiKeyBtn').addEventListener('click',()=>{API_KEYS=$('editApiKeyInput').value.split(',').filter(k=>k.trim());currentKeyIndex=0;saveKeys();$('editApiKeyModal').classList.add('hidden');showToast(`已保存 ${API_KEYS.length} 个 Key`);refreshSettingsUI();});
    $('pricingPreset').addEventListener('change',function(){const p=PRICING_PRESETS[this.value];if(p){$('editInputPrice').value=p.input;$('editOutputPrice').value=p.output;}});
    $('cancelPricingBtn').addEventListener('click',()=>$('editPricingModal').classList.add('hidden'));
    $('savePricingBtn').addEventListener('click',()=>{INPUT_PRICE=parseFloat($('editInputPrice').value)||1;OUTPUT_PRICE=parseFloat($('editOutputPrice').value)||2;savePricing();$('editPricingModal').classList.add('hidden');showToast('费率已更新');refreshSettingsUI();});

    topAvatarBtn.addEventListener('click', ()=>{ $('editNameInput').value=PARTNER_NAME;$('editNameModal').classList.remove('hidden'); });
    topBarName.addEventListener('click', ()=>{ $('editNameInput').value=PARTNER_NAME;$('editNameModal').classList.remove('hidden'); });

    // ========== 主页 ==========
    function refreshHomePage(){
        $('homeName').textContent = PARTNER_NAME;
        $('homeDays').textContent = '在一起 ' + (conversationHistory.length > 0 ? Math.floor((Date.now() - conversationHistory[0].timestamp) / 86400000) : 0) + ' 天';
        if(PARTNER_AVATAR){ $('homeAvatar').innerHTML = `<img src="${PARTNER_AVATAR}">`; }
        else { $('homeAvatar').innerHTML = '👤'; }
        const dates = Object.keys(diary).sort().reverse();
        if(dates.length > 0){
            const latest = diary[dates[0]];
            $('homeDiaryPreview').style.display = 'block';
            $('homeDiaryText').textContent = latest.content.substring(0, 120) + (latest.content.length > 120 ? '...' : '');
        } else {
            $('homeDiaryPreview').style.display = 'none';
        }
    }

    // ========== 初始化 ==========
    const hour=new Date().getHours();let g='晚上好';if(hour<12)g='早上好';else if(hour<18)g='下午好';
    updatePasswordUI(); if(!isPasswordSet()) passwordInput.focus();
    loadData(); applyTheme(); applyUI(); renderCalendarPanel(); refreshHomePage(); refreshMemoryMain();
    setTimeout(()=>{checkDiaryTriggers();checkReminders();},2000);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if(THEME_MODE==='auto')applyTheme();});
})();
</script>
